services:
  app:
    build: .
    container_name: scolar-gestion-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/scolar-gestion
      SESSION_SECRET: change-me
      ADMIN_NAME: Super Admin
      ADMIN_EMAIL: admin@scolar-gestion.local
      ADMIN_PASSWORD: Admin123!
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: scolar-gestion-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: